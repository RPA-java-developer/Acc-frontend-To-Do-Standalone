<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Nueva Tarea</ion-title>
    <ion-icon name="close"  slot="end" size="larger" class="ion-padding" (click)="dismis()"></ion-icon>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card class="ion-align-self-center" >
    <ion-item>
          <ion-textarea [(ngModel)]="taskName" placeholder="Write task here"></ion-textarea>
    </ion-item>



   <ion-item>
     <ion-label >Priority</ion-label>
     <ion-select  [(ngModel)]="taskPriority" placeholder="Choose one">
       <ion-select-option value="low">Low</ion-select-option>
       <ion-select-option value="middle">Middle</ion-select-option>
       <ion-select-option value="high" selected>High</ion-select-option>
      </ion-select>
   </ion-item>
<!-- Displaying the selected value instantly -->
<p>You selected: {{ taskPriority }}</p>

   </ion-item>
  -->


<!-- Botón propio que abre el modal -->
<ion-button id="open-modal-btn">Seleccionar Fecha</ion-button>

<ion-modal trigger="open-modal-btn">
  <ng-template>
    <ion-content>
      <!-- Agregamos los botones de Confirmar/Cancelar nativos -->
      <ion-datetime
        #miDatetime
        showDefaultButtons="true"
        doneText="Confirmar"
        cancelText="Cancelar"
        id="dueDate" [(ngModel)]="taskDueDate">
       >
      </ion-datetime>
    </ion-content>
  </ng-template>
</ion-modal>

   <ion-item>
     <ion-icon name="pricetag-outline" slot="start"></ion-icon>
     <ion-label>Category</ion-label>
     <span>{{selectedCategory}}</span>
   </ion-item>

   <ion-item>

     <ion-chip
          *ngFor="let category of categories; let i = index" color="secondary" outline="true" (click)="selectCategory(i)">
       <ion-label color="secondary">{{category}}</ion-label>
     </ion-chip>

     <ion-chip color="primary" outline="true">
       <ion-label color="secondary">new</ion-label>
       <ion-button fill="clear">
         <ion-icon slot="icon-only" name="add-outline"></ion-icon>
       </ion-button>
     </ion-chip>

   </ion-item>



     <ion-button class="ion-margin" expand="block"  (click)="AddTarea()">Add Task</ion-button>



  </ion-card>




</ion-content>
